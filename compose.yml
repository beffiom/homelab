  #######################################################

  #######################################################
  #-----------------------------------------------------#
  #                       TOOLS                         #
  #-----------------------------------------------------#
  #######################################################

  it-tools:
    container_name: it-tools
    image: docker.io/corentinth/it-tools:latest
    ports:
      - 40661:80
    restart: unless-stopped

  languagetool:
    container_name: languagetool
    image: docker.io/erikvl87/languagetool
    environment:
      - langtool_languageModel=/ngrams   # OPTIONAL: Using ngrams data
      - Java_Xms=512m                    # OPTIONAL: Setting a minimal Java heap size of 512 mib
      - Java_Xmx=1g                      # OPTIONAL: Setting a maximum Java heap size of 1 Gib
    volumes:
      - ./volumes/tools/languagetool/ngrams/data:/ngrams:z     # OPTIONAL: The location of ngrams data on the local machine
      - ./volumes/tools/languagetool/logback.xml:/LanguageTool/logback.xml:ro,z  # OPTIONAL: Overwrite the logging configuration
    ports:
      - 8010:8010
    restart: unless-stopped

  morphos:
    container_name: morphos
    image: ghcr.io/danvergara/morphos-server:latest
    ports:
      - 33245:8080
    restart: unless-stopped

  myip:
    container_name: myip
    image: docker.io/jason5ng32/myip:latest
    ports:
      - 18966:18966
    restart: always

  omni-tools:
    container_name: omni-tools
    image: docker.io/iib0011/omni-tools:latest
    ports:
      - 37799:80
    restart: unless-stopped

  watchyourlan:
    container_name: watchyourlan
    image: docker.io/aceberg/watchyourlan:latest
    environment:
      TZ: ${TZ}               # required: needs your TZ for correct time
      IFACES: "enp4s0 wlxf4ec3892dd51"  # required: 1 or more interface
    volumes:
      - ./volumes/tools/watchyourlan:/data/WatchYourLAN:z
    ports:
      - 8840:8840
    network_mode: host      
    restart: unless-stopped

  #######################################################
  #-----------------------------------------------------#
  #                      STORAGE                        #
  #-----------------------------------------------------#
  #######################################################
  #copyparty:

  immich:
    container_name: immich
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - ${UPLOAD_LOCATION}:/data:z
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - immich-redis
      - immich-db
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ./volumes/storage/immich/model-cache:/cache:z
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-db:
    container_name: immich-db
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data:z
    shm_size: 128mb
    healthcheck:
      disable: false
    restart: always
  
  papra:
    container_name: papra
    image: ghcr.io/papra-hq/papra:latest
    user: 1000:1000
    environment:
      AUTH_SECRET: ${PAPRA_AUTH_SECRET}
      APP_BASE_URL: ${PAPRA_BASE_URL}
    volumes:
      - ./volumes/storage/papra:/app/app-data:rw,z
    ports:
      - 1221:1221
    restart: unless-stopped
  #syncthing:

  #######################################################
  #-----------------------------------------------------#
  #                      TRACKING                       #
  #-----------------------------------------------------#
  #######################################################
  #adventurelog:
  #airtrail:
  #dawarich:
  #lubelogger:
  #traccar:
  yamtrack:
    container_name: yamtrack
    image: ghcr.io/fuzzygrim/yamtrack
    environment:
      - TZ=${TZ}
      - SECRET=${YAMTRACK_SECRET}
      - REDIS_URL=redis://yamtrack-redis:6379
      - DB_HOST=yamtrack-db
      - DB_NAME=yamtrack
      - DB_USER=yamtrack
      - DB_PASSWORD=${YAMTRACK_DB_PASSWORD}
      - DB_PORT=5432
      - REGISTRATION=False
      - STEAM_API_KEY=${STEAM_API_KEY}
    depends_on:
      - yamtrack-db
      - yamtrack-redis
    ports:
      - 38809:8000
    restart: unless-stopped

  yamtrack-db:
    container_name: yamtrack-db
    image: docker.io/postgres:16-alpine
    environment:
      - POSTGRES_DB=yamtrack
      - POSTGRES_USER=yamtrack
      - POSTGRES_PASSWORD=${YAMTRACK_DB_PASSWORD}
    volumes:
      - ./volumes/services/yamtrack/db:/var/lib/postgresql/data:z
    restart: unless-stopped

  yamtrack-redis:
    container_name: yamtrack-redis
    image: docker.io/redis:8-alpine
    volumes:
      - ./volumes/services/yamtrack/redis:/data:z
    restart: unless-stopped

  #######################################################
  #-----------------------------------------------------#
  #                     NETWORKING                      #
  #-----------------------------------------------------#
  #######################################################
  #adguardhome:
  cloudflared:
    container_name: cloudflared
    image: docker.io/cloudflare/cloudflared:latest
    network_mode: host
    cap_add:
      - NET_ADMIN  # For ICMP/ping
    command: tunnel --config /etc/cloudflared/config.yml run lab-tunnel
    #command: tunnel --no-autoupdate run lab-tunnel
    volumes:
      - ./volumes/networking/cloudflared:/etc/cloudflared:z
    restart: unless-stopped

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191
    restart: unless-stopped

  gluetun:
    container_name: gluetun
    image: docker.io/qmcgaw/gluetun:latest
    security_opt:
      - label=disable
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=cKfLZjeQdMyLZQwbSHNA6ENWlvzFvl62yC2xHlDuInw=
      - WIREGUARD_PUBLIC_KEY=7LiZu9B4qzVwl3jKRVs7ivx/BHi/jnSS/GWSuxEClgk=
      - WIREGUARD_PRESHARED_KEY=3YK70QNSH4hQBiO8jRHQEllhpIXcosu/bPmL+IzDsKE=
      - WIREGUARD_ADDRESSES=100.122.11.72/32
      #- SERVER_REGIONS=us east
      - UPDATER_PERIOD=
      - HTTPPROXY=on
      - HTTPPROXY_LISTENING_ADDRESS=:8888
      #- HTTPPROXY_USER=myuser        # optional but recommended
      #- HTTPPROXY_PASSWORD=mypass    # optional but recommended
    volumes:
      - ./volumes/networking/gluetun:/gluetun:z
      - ./volumes/networking/gluetun/wireguard/wg0.conf:/gluetun/wireguard/wg0.conf:ro,z
    ports:
      - 44001:44001 # Qbittorent
      - 8888:8888/tcp   # HTTP proxy
    restart: always

  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    user: 1000:1000
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=44001
      - UMASK=0000
    security_opt:
      - label=disable
    privileged: true
    volumes:
      - ./volumes/networking/qbittorrent/config:/config:z
      - ${EXT_DRIVE}/media/video/shows/.downloads:/downloads/tv-sonarr:rw,z
      - ${EXT_DRIVE}/media/video/films/.downloads:/downloads/movies-radarr:rw,z
      - ${EXT_DRIVE}/media/audio/audiobooks/.downloads:/downloads/audiobooks:rw,z
    network_mode: "container:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped

  traefik:
    container_name: traefik
    image: docker.io/traefik:latest
    command: |
      --providers.docker=true
      --providers.docker.exposedbydefault=false
      --providers.docker.network=homelab_default
      --providers.file.directory=/dynamic
      --providers.file.watch=true
      --entrypoints.web.address=:8000
      --entrypoints.websecure.address=:8443
      --certificatesresolvers.cloudflare.acme.email=${CLOUDFLARE_EMAIL}
      --certificatesresolvers.cloudflare.acme.dnschallenge=true
      --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      --certificatesresolvers.cloudflare.acme.storage=/acme.json
      --api.insecure=true
      --api.dashboard=true
      --accesslog=true
      --log.level=DEBUG
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_API_KEY}
    labels:
      - "traefik.enable=true"
    security_opt:
      - label=disable
    volumes:
      - ./volumes/networking/traefik/dynamic:/dynamic:ro,z
      - ./volumes/networking/traefik/acme.json:/acme.json:z
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:z
    ports:
      - "8443:8443"  # 0.0.0.0 not 127.0.0.1
      - "8000:8000"
      - "8080:8080"
    networks:
      default:
    restart: always
  
  #######################################################
  #-----------------------------------------------------#
  #                     MONITORING                      #
  #-----------------------------------------------------#
  #######################################################
  #prometheus:
  #glance:
  #grafana:
  mafl:
    container_name: mafl # change as needed
    image: docker.io/hywax/mafl
    ports:
      - 3000:3000
    volumes:
      - ./volumes/monitoring/mafl:/app/data:z
    restart: unless-stopped

  tracearr:
    container_name: tracearr
    image: ghcr.io/connorgallopo/tracearr:latest
    ports:
      - 37171:3000
    environment:
      - NODE_ENV=production
      - PORT=37171
      - HOST=0.0.0.0
      - TZ=${TZ}
      - DATABASE_URL=postgres://tracearr:${TRACEARR_DB_PASSWORD:-tracearr}@timescale:5432/tracearr
      - REDIS_URL=redis://tracearr-redis:6379
      - JWT_SECRET=${TRACEARR_JWT_SECRET}
      - COOKIE_SECRET=${TRACEAR_COOKIE_SECRET}
      - CORS_ORIGIN=*
      - LOG_LEVEL=info
      # - DATABASE_POOL_MAX=50  # Database connection pool size (default: 50)
    volumes:
      - ./volumes/monitoring/tracearr/backup:/data/backup:rw,z
    depends_on:
      tracearr-timescale:
        condition: service_healthy
      tracearr-redis:
        condition: service_healthy
    restart: unless-stopped

  tracearr-redis:
    container_name: tracearr-redis
    image: docker.io/redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/monitoring/tracearr/redis:/data:rw,z
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
      
  tracearr-timescale:
    # TimescaleDB HA with PostgreSQL 18 - pinned for stability
    image: docker.io/timescale/timescaledb-ha:pg18.1-ts2.25.0
    container_name: tracearr-timescale
    shm_size: 512mb  # Required for PostgreSQL shared memory (increase for large imports)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536  # TimescaleDB chunks require many file descriptors
    # Allow unlimited tuple decompression for migrations on compressed hypertables
    # Increase lock table size for large imports (Tautulli imports with many TimescaleDB chunks)
    command: postgres -c timescaledb.max_tuples_decompressed_per_dml_transaction=0 -c max_locks_per_transaction=4096 -c timescaledb.telemetry_level=off
    environment:
      - POSTGRES_USER=tracearr
      - POSTGRES_PASSWORD=${TRACEAR_DB_PASSWORD:-tracearr}
      - POSTGRES_DB=tracearr
    volumes:
      - ./volumes/monitoring/tracearr/db:/home/postgres/pgdata/data:rw,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracearr"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #uptime-kuma:
  uptime-kuma:
    container_name: uptime-kuma
    image: docker.io/louislam/uptime-kuma:latest
    environment:
      - TZ=${TZ}
      - UMASK=0022
    volumes:
      - ./volumes/monitoring/uptime-kuma:/app/data:rw,z
    ports:
      - 3001:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always

  #######################################################
  #-----------------------------------------------------#
  #                      SECURITY                       #
  #-----------------------------------------------------#
  #######################################################
  #aliasvault:
  #authentik:
  #  container_name: authentik
  #  image: ghcr.io/goauthentik/server:latest
  #  command: server
  #  labels:
  #    - "traefik.enable=true"
  #    - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"  # Your Authentik domain
  #    - "traefik.http.routers.authentik.entrypoints=websecure"
