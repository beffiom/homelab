  #                      FINANCES                       #
  #-----------------------------------------------------#

  #sure:
  #wallos:

  #######################################################

  #######################################################
  #-----------------------------------------------------#
  #                       TOOLS                         #
  #-----------------------------------------------------#
  #######################################################

  #it-tools:
  #language-tool:
  #morpheus:
  #myip:
  #omnitools:
  #watchyourlan:

  #######################################################
  #-----------------------------------------------------#
  #                      STORAGE                        #
  #-----------------------------------------------------#
  #######################################################
  #copyparty:

  immich:
    container_name: immich
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - ${UPLOAD_LOCATION}:/data:z
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - immich-redis
      - immich-db
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ./volumes/storage/immich/model-cache:/cache:z
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-db:
    container_name: immich-db
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data:z
    shm_size: 128mb
    healthcheck:
      disable: false
    restart: always
  
  #papra:
  #syncthing:

  #######################################################
  #-----------------------------------------------------#
  #                      TRACKING                       #
  #-----------------------------------------------------#
  #######################################################
  #adventurelog:
  #airtrail:
  #dawarich:
  #lubelogger:
  #traccar:
  #yamtrack:

  #######################################################
  #-----------------------------------------------------#
  #                     NETWORKING                      #
  #-----------------------------------------------------#
  #######################################################
  #adguardhome:
  cloudflared:
    container_name: cloudflared
    image: docker.io/cloudflare/cloudflared:latest
    network_mode: host
    command: tunnel --no-autoupdate run lab-tunnel
    volumes:
      - ./volumes/networking/cloudflared:/etc/cloudflared:z
    restart: unless-stopped
  #flaresolver:
  #gluetun:
  #qbittorrent:
  #traefik:
  traefik:
    container_name: traefik
    image: docker.io/traefik:latest
    command: |
      --providers.docker=true
      --providers.docker.exposedbydefault=false
      --providers.docker.network=homelab_default
      --entrypoints.web.address=:8000
      --entrypoints.websecure.address=:8443
      --certificatesresolvers.cloudflare.acme.email=${CLOUDFLARE_ACME_EMAIL}
      --certificatesresolvers.cloudflare.acme.dnschallenge=true
      --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      --api.insecure=true
      --api.dashboard=true
      --accesslog=true
      --log.level=DEBUG
    labels:
      - "traefik.enable=true"
    security_opt:
      - label=disable
    volumes:
      - ./volumes/networking/traefik/dynamic:/dynamic:ro,z
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock:z
    ports:
      - "8443:8443"  # 0.0.0.0 not 127.0.0.1
      - "8000:8000"
      - "8080:8080"
    networks:
      default:
        ipv4_address: 10.89.0.13
    restart: always
  
  #######################################################
  #-----------------------------------------------------#
  #                     MONITORING                      #
  #-----------------------------------------------------#
  #######################################################
  #prometheus:
  #glance:
  #grafana:
  mafl:
    container_name: mafl # change as needed
    image: docker.io/hywax/mafl
    ports:
      - '3000:3000'
    volumes:
      - ./volumes/monitoring/mafl:/app/data:z
    restart: unless-stopped
  #tracearr:
  #uptime-kuma:

