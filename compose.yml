version: '3.9'
networks:
  default:
    ipam:
      config:
        - subnet: 10.89.0.0/24
services:
  #######################################################
  #-----------------------------------------------------#
  #                       MEDIA                         #
  #-----------------------------------------------------#
  #######################################################
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    ports:
      - 13378:80
    volumes:
      - ${SSD1}/media/audio/audiobooks/audiobookshelf:/audiobooks:z
      - ${SSD1}/media/audio/podcasts/audiobookshelf:/podcasts:z
      - ./volumes/media/audiobookshelf/config:/config:z
      - ./volumes/media/audiobookshelf/metadata:/metadata:z
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  jellyfin:
    container_name: jellyfin
    image: docker.io/jellyfin/jellyfin:latest
    environment:
      - TZ=${TZ}
    volumes:
      - ./volumes/media/jellyfin:/config:z
      - ${SSD2}/shows:/data/tvshows:z
      - ${SSD1}/media/video/films:/data/movies:z
      - ${SSD1}/media/audio/music:/data/music:z
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab_default"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.url=http://10.89.0.3:8096"
    ports:
      - 127.0.0.1:8096:8096
      - 127.0.0.1:8920:8920
      - 127.0.0.1:1900:1900/udp
    networks:
      default:
        ipv4_address: 10.89.0.3
    restart: unless-stopped

  jellyfin-meilisearch:
     container_name: jellyfin-meilisearch
     image: docker.io/getmeili/meilisearch:latest
     environment:
       MEILI_ENV: production
       MEILI_NO_ANALYTICS: "true"
       MEILI_MASTER_KEY: ${JF_MEILI_MASTER_KEY}
     volumes:
       # meilisearch's data
       - ./volumes/media/jellyfin/meilisearch/data:/meili_data:z
     ports:
       - 7700:7700
     restart: unless-stopped

  #kavita:

  kiwix:
    container_name: kiwix
    image: ghcr.io/kiwix/kiwix-serve
    volumes:
      - ${SSD1}/media/sites/zim:/data:z
    ports:
      - '39237:8080'
    command: '*.zim'
    restart: unless-stopped

  #miniflux:

  #navidrome:

  readeck:
    container_name: readeck
    image: codeberg.org/readeck/readeck:latest
    volumes:
      - ./volumes/media/readeck:/readeck:z
    ports:
      - 36787:8000
    restart: unless-stopped

  #romm:

  #romm:
  
  #tubearchivist:

  #######################################################
  #-----------------------------------------------------#
  #                         ARR                         #
  #-----------------------------------------------------#
  #######################################################

  #audiobookrequest:
  #bazarr:
  #monochrome:
  #prowlarr:
  #radarr:
  #seerr:
  #sonarr:
  #soulsolid:

