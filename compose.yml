version: '3.9'
services:
  #######################################################
  #-----------------------------------------------------#
  #                       MEDIA                         #
  #-----------------------------------------------------#
  #######################################################
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    ports:
      - 13378:80
    volumes:
      - $SSD1/media/audio/audiobooks/audiobookshelf:/audiobooks:z
      - $SSD1/media/audio/podcasts/audiobookshelf:/podcasts:z
      - ./volumes/audiobookshelf/config:/config:z
      - ./volumes/audiobookshelf/metadata:/metadata:z
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  jellyfin:
    container_name: jellyfin
    image: docker.io/jellyfin:latest
    environment:
      - TZ=${TZ}
    volumes:
      - ./volumes/jellyfin:/config:z
      - $SSD1/shows:/data/tvshows:z
      - $SSD2/media/video/films:/data/movies:z
    ports:
      - 8096:8096
      - 8920:8920 #optional - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    restart: unless-stopped

  #kavita:

  kiwix:
    container_name: kiwix
    image: ghcr.io/kiwix/kiwix-serve
    volumes:
      - $SSD1/media/sites/zim:/data:z
    ports:
      - '39237:8080'
    command: '*.zim'
    restart: unless-stopped

  #miniflux:

  #navidrome:

  readeck:
    container_name: readeck
    image: codeberg.org/readeck/readeck:latest
    volumes:
      - ./volumes/readeck:/readeck:z
    ports:
      - 8000:8000
    restart: unless-stopped

  #romm:

  #romm:
  
  #tubearchivist:

  #######################################################
  #-----------------------------------------------------#
  #                         ARR                         #
  #-----------------------------------------------------#
  #######################################################

  #audiobookrequest:
  #bazarr:
  #monochrome:
  #prowlarr:
  #radarr:
  #seerr:
  #sonarr:
  #soulsolid:

  #######################################################
  #-----------------------------------------------------#
  #                     PRODUCTIVITY                    #
  #-----------------------------------------------------#
  #######################################################

  #beaver:
  #siyuan:
  #solidtime:
  #wakapi:
  
  #######################################################
  #-----------------------------------------------------#
  #                      SERVICES                       #
  #-----------------------------------------------------#
  #######################################################

  #algernon:
  #archivebox:
  #cookcli:
  #karoake-eternal:
  #pdfding:
  #reactive-resume:
  #searxng:
  #wingfit:
  
  #######################################################
  #-----------------------------------------------------#
  #                      FINANCES                       #
  #-----------------------------------------------------#

  #sure:
  #wallos:

  #######################################################

  #######################################################
  #-----------------------------------------------------#
  #                       TOOLS                         #
  #-----------------------------------------------------#
  #######################################################

  it-tools:
  language-tool:
  morpheus:
  myip:
  omnitools:
  watchyourlan:

  #######################################################
  #-----------------------------------------------------#
  #                      STORAGE                        #
  #-----------------------------------------------------#
  #######################################################
  #copyparty:

  immich:
    container_name: immich
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      - ${UPLOAD_LOCATION}:/data:z
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - immich-redis
      - immich-db
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ./volumes/immich/model-cache:/cache:z
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-db:
    container_name: immich-db
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data:z
    shm_size: 128mb
    healthcheck:
      disable: false
    restart: always
  
  #papra:
  #syncthing:

  #######################################################
