version: '3.9'
networks:
  default:
    ipam:
      config:
        - subnet: 10.89.0.0/24
services:
  #######################################################
  #-----------------------------------------------------#
  #                       MEDIA                         #
  #-----------------------------------------------------#
  #######################################################
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    volumes:
      - ${EXT_DRIVE}/media/audio/audiobooks/audiobookshelf:/audiobooks:Z
      - ${EXT_DRIVE}/media/audio/podcasts/audiobookshelf:/podcasts:Z
      - ./volumes/media/audiobookshelf/config:/config:z
      - ./volumes/media/audiobookshelf/metadata:/metadata:z
    environment:
      - TZ=${TZ}
    ports:
      - 13378:80
    restart: unless-stopped

  jellyfin:
    container_name: jellyfin
    image: docker.io/jellyfin/jellyfin:latest
    environment:
      - TZ=${TZ}
    security_opt:
      - label=disable
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./volumes/media/jellyfin:/config:z
      - ./volumes/media/jellyfin/cache:/cache:z
      - ${EXT_DRIVE}/media/video/shows:/data/tvshows:rw,Z
      - ${EXT_DRIVE}/media/video/films:/data/movies:rw,Z
      - ${EXT_DRIVE}/media/audio/music:/data/music:rw,Z
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab_default"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.url=http://10.89.0.3:8096"
      - "traefik.http.routers.jellyfin-docker.priority=10"  # Low
      - "traefik.http.middlewares.jellyfin-compress.compress=true"
      - "traefik.http.routers.jellyfin.middlewares=jellyfin-compress"
    ports:
      - 127.0.0.1:8096:8096
      - 127.0.0.1:8920:8920
      - 127.0.0.1:1900:1900/udp
    deploy:
      resources:
        limits:
          memory: 16g
    networks:
      default:
        ipv4_address: 10.89.0.3
    restart: unless-stopped

  jellyfin-meilisearch:
     container_name: jellyfin-meilisearch
     image: docker.io/getmeili/meilisearch:latest
     environment:
       MEILI_ENV: production
       MEILI_NO_ANALYTICS: "true"
       MEILI_MASTER_KEY: ${JF_MEILI_MASTER_KEY}
     volumes:
       # meilisearch's data
       - ./volumes/media/jellyfin/meilisearch/data:/meili_data:z
     ports:
       - 7700:7700
     restart: unless-stopped

  #kavita:

  kiwix:
    container_name: kiwix
    image: ghcr.io/kiwix/kiwix-serve
    volumes:
      - ${EXT_DRIVE}/media/sites/zim:/data:z
    ports:
      - '39237:8080'
    command: '*.zim'
    restart: unless-stopped

  #miniflux:

  readeck:
    container_name: readeck
    image: codeberg.org/readeck/readeck:latest
    volumes:
      - ./volumes/media/readeck:/readeck:z
    ports:
      - 36787:8000
    restart: unless-stopped

  #romm:
  
  #tubearchivist:

  #######################################################
  #-----------------------------------------------------#
  #                         ARR                         #
  #-----------------------------------------------------#
  #######################################################

  audiobookrequest:
    container_name: audiobookrequest
    image: docker.io/markbeep/audiobookrequest:latest
    environment:
      - TZ=${TZ}
    ports:
      - 35667:8000
    volumes:
      - ./volumes/arr/audiobookrequest:/config:rw,z
      - ${EXT_DRIVE}/media/audio/audiobooks/.downloads:/downloads/audiobooks:rw,z
    restart: always

  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./volumes/arr/bazarr/config:/config:z
      - ${EXT_DRIVE}/media/video/shows:/tv:Z
      - ${EXT_DRIVE}/media/video/films:/movies:Z
    ports:
      - 6767:6767
    restart: unless-stopped

  #monochrome:
  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./volumes/arr/prowlarr/data:/config:z
    ports:
      - 9696:9696
    restart: unless-stopped

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    security_opt:
      - label=disable
    privileged: true
    volumes:
      - ./volumes/arr/radarr/data:/config:z
      - ${EXT_DRIVE}/media/video/films:/movies:rw,z
      - ${EXT_DRIVE}/media/video/films/.downloads:/downloads:rw,z
    ports:
      - 7878:7878
    restart: unless-stopped

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab_default"
      - "traefik.http.routers.seerr.rule=Host(`seerr.${DOMAIN}`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      #- "traefik.http.routers.seerr.tls.certresolver=cloudflare"
      - "traefik.http.services.seerr.loadbalancer.server.url=http://10.89.0.35:5055"
      - "traefik.http.routers.seerr-docker.priority=10"  # Low
    ports:
      - 5055:5055
    volumes:
      - ./volumes/arr/seerr/config:/app/config:z
    networks:
      default:
        ipv4_address: 10.89.0.35
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    security_opt:
      - label=disable
    privileged: true
    volumes:
      - ./volumes/arr/sonarr/data:/config:z
      - ${EXT_DRIVE}/media/video/shows:/tv:rw,z
      - ${EXT_DRIVE}/media/video/shows/.downloads:/downloads:rw,z
    ports:
      - 8989:8989
    restart: unless-stopped
  #soulsolid:

  #######################################################
  #-----------------------------------------------------#
  #                     PRODUCTIVITY                    #
  #-----------------------------------------------------#
  #######################################################

  #beaver:
  #siyuan:
  #solidtime:
  #wakapi:
  
  #######################################################
  #-----------------------------------------------------#
  #                      SERVICES                       #
  #-----------------------------------------------------#
  #######################################################

  #algernon:
  #archivebox:
  #cookcli:
  #karoake-eternal:
  #pdfding:
  #reactive-resume:

  #searxng:
  #  container_name: searxng
  #  image: docker.io/searxng/searxng:latest
  #  volumes:
  #    - ./volumes/services/searxng:/etc/searxng:rw,z
  #    - ./volumes/services/searxng/data:/var/cache/searxng:rw,z
  #  ports:
  #    - "127.0.0.1:34347:8080"
  #  logging:
  #    driver: "json-file"
  #    options:
  #      max-size: "1m"
  #      max-file: "1"
  #  restart: unless-stopped

  #searxng-redis:
  #  container_name: searxng-redis
  #  image: docker.io/valkey/valkey:8-alpine
  #  command: valkey-server --save 30 1 --loglevel warning
  #  volumes:
  #    - ./volumes/services/searxng/redis:/data:rw,z
  #  logging:
  #    driver: "json-file"
  #    options:
  #      max-size: "1m"
  #      max-file: "1"
  #  restart: unless-stopped

  #wingfit:

  #######################################################
